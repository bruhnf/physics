# Local development Postgres for STEM Lab backend.
# Production uses Lightsail-hosted Postgres per docs/architecture/.
services:
  postgres:
    image: postgres:15-alpine
    container_name: stemlab_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: stemlab
      POSTGRES_PASSWORD: stemlab_dev_only
      POSTGRES_DB: stemlab
    ports:
      - "5433:5432"  # 5433 on host to avoid conflict with any local Postgres on 5432
    volumes:
      - stemlab_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stemlab -d stemlab"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  stemlab_pg_data:
